<div class="articles-wrapper">
  <app-navbar />

  <main class="articles-content">
    <div class="articles-toolbar">
      <button class="btn-create" routerLink="/articles/create">Créer un article</button>
      <span class="sort" (click)="toggleSort()">Trier par ↓</span>
    </div>

    <div class="articles-grid">
      @for (article of articles; track article.id) {
        <div class="article-card" (click)="goToArticle(article.id)">
          <h2 class="article-title">{{ article.titre }}</h2>
          <div class="article-meta">
            <span>{{ article.datePublication | date:'dd/MM/yyyy' }}</span>
            <span>{{ article.auteur }}</span>
          </div>
          <p class="article-excerpt">{{ article.contenu }}</p>
        </div>
      } @empty {
        <p class="no-articles">Aucun article disponible.</p>
      }
    </div>
  </main>
</div>
